# Packages for CachyOS Gaming Mode

pacman:
  packages:
    - name: cachyos-gaming-meta
      description: "The official CachyOS meta-package for a complete gaming setup."
    - name: discord
      description: "Voice and text chat for gamers"
    - name: gamemode
      description: "GameMode daemon for performance optimization"
    - name: lib32-gamemode
      description: "32-bit GameMode libraries"
    - name: goverlay
      description: "Gaming overlay for performance monitoring"
    - name: mangohud
      description: "Vulkan/OpenGL overlay for monitoring FPS and more"
    - name: lib32-mangohud
      description: "32-bit MangoHud libraries"
    - name: steam
      description: "Digital distribution platform for games"
    - name: wine
      description: "Compatibility layer for running Windows applications"

aur:
  packages:
    - name: proton-cachyos
      description: "A custom Proton build with CachyOS optimizations."

flatpak:
  apps:
    - name: com.heroicgameslauncher.hgl
      description: "Open source launcher for GOG and Epic Games."
    - name: com.vysp3r.ProtonPlus
      description: "Manager for Proton-GE and other compatibility tools for Steam."
    - name: io.github.Faugus.faugus-launcher
      description: "Launcher for modded Bethesda games (replaces Lutris)."

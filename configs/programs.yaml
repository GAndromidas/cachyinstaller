# This file contains all package lists for different installation modes and desktop environments

# Pacman packages (same for all installation modes)
pacman:
  packages:
    - name: android-tools
      description: "Android platform tools for device management"
    - name: bat
      description: "Cat clone with syntax highlighting"
    - name: bleachbit
      description: "System cleaner and optimizer"
    - name: btop
      description: "Resource monitor"
    - name: chromium
      description: "Web browser"
    - name: cmatrix
      description: "Matrix-style terminal animation"
    - name: cpupower
      description: "CPU frequency scaling tools"
    - name: dosfstools
      description: "DOS filesystem utilities"
    - name: duf
      description: "Disk usage utility"
    - name: firefox
      description: "Web browser"
    - name: fwupd
      description: "Firmware update daemon"
    - name: gnome-disk-utility
      description: "Disk management utility"
    - name: hwinfo
      description: "Hardware information tool"
    - name: inxi
      description: "System information script"
    - name: ncdu
      description: "NCurses disk usage analyzer"
    - name: net-tools
      description: "Network configuration tools"
    - name: nmap
      description: "Network discovery and security auditing"
    - name: noto-fonts-extra
      description: "Additional Noto fonts"
    - name: samba
      description: "SMB/CIFS file and print server"
    - name: sl
      description: "Steam locomotive animation"
    - name: speedtest-cli
      description: "Internet speed test tool"
    - name: sshfs
      description: "FUSE-based SSH filesystem"
    - name: ttf-hack-nerd
      description: "Hack Nerd Font"
    - name: ttf-liberation
      description: "Liberation fonts"
    - name: unrar
      description: "RAR archive extractor"
    - name: wakeonlan
      description: "Wake-on-LAN utility"
    - name: xdg-desktop-portal-gtk
      description: "GTK backend for XDG Desktop Portal"

# Essential packages for different installation modes
essential:
  default:
    - name: filezilla
      description: "FTP client for file transfers"
    - name: kdenlive
      description: "Video editor for KDE"
    - name: libreoffice-fresh
      description: "Full-featured office suite"
    - name: solaar
      description: "Logitech device manager"

  minimal:
    - name: mpv
      description: "Media player"

# AUR packages for different installation modes (using paru - CachyOS default)
aur:
  default:
    - name: dropbox
      description: "Cloud storage and file synchronization"
    - name: rustdesk-bin
      description: "Remote desktop software"
    - name: spotify
      description: "Music streaming client"
    - name: ventoy-bin
      description: "Bootable USB creation tool"
    - name: via-bin
      description: "Keyboard configuration utility"

  minimal:
    - name: rustdesk-bin
      description: "Remote desktop software"

# Desktop environment specific packages
desktop_environments:
  kde:
    install:
      - gwenview
      - kdeconnect
      - kwalletmanager
      - kvantum
      - okular
      - python-pyqt6
      - qbittorrent
      - spectacle
    remove:
      - htop

  gnome:
    install:
      - adw-gtk-theme
      - celluloid
      - dconf-editor
      - gnome-tweaks
      - gufw
      - seahorse
      - transmission-gtk
    remove:
      - epiphany
      - gnome-contacts
      - gnome-maps
      - gnome-music
      - gnome-tour
      - htop
      - snapshot

  cosmic:
    install:
      - transmission-gtk
    remove:
      - htop

# Flatpak packages for different desktop environments
flatpak:
  kde:
    default:
      - name: it.mijorus.gearlever
        description: "Graphical package manager for Flatpak"
    minimal:
      - name: it.mijorus.gearlever
        description: "Graphical package manager for Flatpak"
  gnome:
    default:
      - name: com.mattjakeman.ExtensionManager
        description: "GNOME Shell extension manager"
      - name: it.mijorus.gearlever
        description: "Graphical package manager for Flatpak"
    minimal:
      - name: com.mattjakeman.ExtensionManager
        description: "GNOME Shell extension manager"
      - name: it.mijorus.gearlever
        description: "Graphical package manager for Flatpak"
  cosmic:
    default:
      - name: dev.edfloreshz.CosmicTweaks
        description: "Tweaks and customization for Cosmic desktop"
      - name: it.mijorus.gearlever
        description: "Graphical package manager for Flatpak"
    minimal:
      - name: dev.edfloreshz.CosmicTweaks
        description: "Tweaks and customization for Cosmic desktop"
      - name: it.mijorus.gearlever
        description: "Graphical package manager for Flatpak"
  generic: # Fallback for unsupported DEs/WMs
    default:
      - name: it.mijorus.gearlever
        description: "Graphical package manager for Flatpak"
    minimal:
      - name: it.mijorus.gearlever
        description: "Graphical package manager for Flatpak"
